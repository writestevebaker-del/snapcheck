name: SnapCheck

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SnapCheck
        run: pip install -e .

      - name: Run health scan
        run: snapcheck scan . --fail-on-critical --no-duplicates